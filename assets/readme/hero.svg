<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">pi-cc-extensions</title>
  <desc id="desc">Claude 与 Pi 品牌图标组合连接三项扩展能力：Claude Code 风格界面、上下文洞察和历史 Session 引用。</desc>

  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D131B"/>
      <stop offset="1" stop-color="#090D12"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" rx="28" fill="url(#panel)"/>
  <rect x="1" y="1" width="1198" height="398" rx="27" fill="none" stroke="#263241" stroke-width="2"/>

  <g id="title-block" transform="translate(64 58)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="600" letter-spacing="1.4">
      <text x="0" y="0" fill="#66E3C4">PI EXTENSION PACK</text>
      <text x="178" y="0" fill="#536172">/</text>
      <text x="198" y="0" fill="#8B9AAD">TERMINAL WORKFLOW</text>
    </g>

    <text x="0" y="82" fill="#F4F7FA" font-size="54" font-weight="750" letter-spacing="-1.5">pi-cc-extensions</text>
    <text x="0" y="130" fill="#B8C3CF" font-size="23">让 Pi 拥有更清晰、更可控的终端工作流</text>

    <g transform="translate(0 180)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">
      <rect width="488" height="58" rx="12" fill="#111923" stroke="#2B3948"/>
      <text x="20" y="36" fill="#66E3C4">›</text>
      <text x="44" y="36" fill="#F4F7FA">/ccstyle</text>
      <text x="155" y="36" fill="#536172">·</text>
      <text x="178" y="36" fill="#7CC7FF">/context</text>
      <text x="292" y="36" fill="#536172">·</text>
      <text x="315" y="36" fill="#F2C879">@session:</text>
      <rect x="411" y="22" width="9" height="20" rx="2" fill="#66E3C4"/>
    </g>

    <g transform="translate(0 282)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <circle cx="6" cy="-5" r="6" fill="#66E3C4"/>
      <text x="22" y="0" fill="#8B9AAD">3 EXTENSIONS</text>
      <text x="160" y="0" fill="#3B4857">•</text>
      <text x="183" y="0" fill="#8B9AAD">TYPESCRIPT</text>
      <text x="303" y="0" fill="#3B4857">•</text>
      <text x="326" y="0" fill="#8B9AAD">NODE ≥ 22.19</text>
    </g>
  </g>

  <g id="extension-map" transform="translate(662 48)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <g id="claude-pi-mark" transform="translate(0 0)">
