      <path transform="translate(2 2) scale(.34)" fill="#D97757" d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9-4.7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2-2 .2-3 1-1 8-5.5Z"/>

      <path d="M50 3V35" stroke="#3A4857" stroke-width="2"/>

      <!-- Official Pi logo vectors; source: https://pi.dev/logo-auto.svg -->
      <g transform="translate(52 -5) scale(.06)" fill="#F4F7FA">
        <path fill-rule="evenodd" d="M165.29 165.29H517.36V400H400V517.36H282.65V634.72H165.29ZM282.65 282.65V400H400V282.65Z"/>
        <path d="M517.36 400H634.72V634.72H517.36Z"/>
      </g>
      <text x="104" y="15" fill="#F4F7FA" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="700" letter-spacing=".8">CLAUDE CODE UX</text>
      <text x="104" y="34" fill="#7F8D9C" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="1.2">FOR PI</text>
    </g>

    <g transform="translate(0 52)">
      <rect width="474" height="82" rx="14" fill="#101821" stroke="#2C3A48"/>
      <rect width="5" height="82" rx="2.5" fill="#66E3C4"/>
      <text x="26" y="32" fill="#F4F7FA" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">/ccstyle</text>
      <text x="26" y="59" fill="#8B9AAD" font-size="16">工具摘要 · Diff · 状态栏</text>
      <circle cx="438" cy="29" r="9" fill="#66E3C4" opacity=".18"/>
      <path d="M434 29l3 3 6-7" fill="none" stroke="#66E3C4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(0 144)">
      <rect width="474" height="82" rx="14" fill="#101821" stroke="#2C3A48"/>
      <rect width="5" height="82" rx="2.5" fill="#7CC7FF"/>
      <text x="26" y="32" fill="#F4F7FA" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">/context</text>
      <text x="26" y="59" fill="#8B9AAD" font-size="16">用量分布 · 注入内容预览</text>
      <g transform="translate(416 23)">
        <rect width="42" height="14" rx="7" fill="#1C2B38"/>
        <rect width="27" height="14" rx="7" fill="#7CC7FF"/>
      </g>
    </g>

    <g transform="translate(0 236)">
      <rect width="474" height="82" rx="14" fill="#101821" stroke="#2C3A48"/>
      <rect width="5" height="82" rx="2.5" fill="#F2C879"/>
      <text x="26" y="32" fill="#F4F7FA" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">@session:</text>
      <text x="26" y="59" fill="#8B9AAD" font-size="16">历史补全 · 跨会话引用</text>
      <text x="431" y="40" fill="#F2C879" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">@</text>
    </g>
  </g>
</svg>
